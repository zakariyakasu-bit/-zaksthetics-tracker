const COLOUR_NORM_MAP = {
  "Black-Black": "Black",
  "Black Black": "Black",
  "White-Black": "White/Black",
  "White Black": "White/Black",
  "Pine Green-Black": "Green/Black",
  "Pine Green/Black": "Green/Black",
  "Pine Green Black": "Green/Black",
  "Bright Crimson": "Crimson",
  "Turq White": "Turq/White",
  "Black-Silver": "Black Silver",
  "White-Silver": "White Silver",
  "Grey-Fog": "Grey Fog",
  "Smoke-Grey": "Smoke Grey"
};
function getItemLabel(s) {
  if (!s) return "";
  const colour = s.colour || "";
  const itemName = s.itemName || "";
  const type = s.stockType || s.type || "set";
  // itemName always takes priority - use specific product names
  if (itemName === "Miler Top") return `${colour} Miler Top`.trim();
  if (itemName === "Challenger Shorts") return `${colour} Challenger Shorts`.trim();
  if (itemName === "Park VII Jersey") return `${colour} Park VII Jersey`.trim();
  if (itemName === "Park III Shorts") return `${colour} Park III Shorts`.trim();
  if (itemName === "Nike Park Senior Set") return `${colour} Park Senior Set`.trim();
  // Fall back to type
  if (type === "external") return `${colour} ${itemName}`.trim();
  if (type === "top") return `${colour} Park VII Jersey`.trim();
  if (type === "shorts") return `${colour} Park III Shorts`.trim();
  return `${colour} Park Senior Set`.trim();
}
function normaliseColour(colour) {
  if (!colour) return colour;
  return COLOUR_NORM_MAP[colour] || colour;
}

// ── Run once to fix colour names in existing stock ──────────────
function getItemNameFromStock(s) {
  const colour = s.colour || "";
  const type = s.stockType || s.type || "set";
  const cost = s.costGBP || s.cost || 0;
  // Already has correct itemName - keep it
  if (s.itemName && ["Miler Top", "Challenger Shorts", "Park VII Jersey", "Park III Shorts", "Nike Park Senior Set"].includes(s.itemName)) return s.itemName;
  // Challenger Shorts - unique cost £27.95
  if (Math.abs(cost - 27.95) < 0.50) return "Challenger Shorts";
  // Park VII Jersey - unique cost £9.50
  if (Math.abs(cost - 9.50) < 0.50) return "Park VII Jersey";
  // Park III Shorts - unique cost £10.75 or £10.95
  if (cost > 9.50 && cost < 12.00 && type !== "set") return "Park III Shorts";
  // Miler Top - £22.95 but type="top"
  if (type === "top" && Math.abs(cost - 22.95) < 0.50) return "Miler Top";
  // Colours that are exclusively Miler/Challenger
  if (["White Silver", "Grey Fog"].includes(colour)) return "Miler Top";
  if (colour === "Smoke Grey") return "Challenger Shorts";
  // Everything else is a Dri-Fit Set
  return "Nike Park Senior Set";
}
function migrateColourNames() {
  // Always run v4 - forces itemName fix on all stock
  const done = localStorage.getItem('zak_colour_migration_v6');
  if (done) return;
  try {
    const raw = localStorage.getItem('zak_stock');
    if (raw) {
      const stock = JSON.parse(raw);
      const fixed = stock.map(s => ({
        ...s,
        colour: normaliseColour(s.colour),
        itemName: getItemNameFromStock(s)
      }));
      localStorage.setItem('zak_stock', JSON.stringify(fixed));
    }
    const driRaw = localStorage.getItem('zak_dri_stock');
    if (driRaw) {
      const dri = JSON.parse(driRaw);
      localStorage.setItem('zak_dri_stock', JSON.stringify(dri.map(s => ({
        ...s,
        colour: normaliseColour(s.colour)
      }))));
    }
    // Clear old migration keys so this always re-runs if needed
    localStorage.removeItem('zak_colour_migration_v2');
    localStorage.removeItem('zak_colour_migration_v3');
    localStorage.setItem('zak_colour_migration_v6', 'done');
  } catch (e) {
    console.error('Colour migration failed', e);
  }
}

// Read a key from Supabase zak_store table
async function supaGet(key) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/zak_store?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: SUPA_HEADERS
    });
    if (!r.ok) return null;
    const rows = await r.json();
    return rows.length > 0 ? rows[0].value : null;
  } catch {
    return null;
  }
}

// Write a key to Supabase zak_store (upsert)
async function supaSet(key, value) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/zak_store`, {
      method: "POST",
      headers: {
        ...SUPA_HEADERS,
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({
        key,
        value
      })
    });
  } catch (e) {
    console.error("supaSet error", e);
  }
}

// Delete a key from Supabase zak_store
async function supaDel(key) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/zak_store?key=eq.${encodeURIComponent(key)}`, {
      method: "DELETE",
      headers: SUPA_HEADERS
    });
  } catch (e) {
    console.error("supaDel error", e);
  }
}

// Load ALL keys at once on startup (single round-trip)
async function supaLoadAll() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/zak_store?select=key,value`, {
      headers: SUPA_HEADERS
    });
    if (!r.ok) return {};
    const rows = await r.json();
    const out = {};
    rows.forEach(({
      key,
      value
    }) => out[key] = value);
    return out;
  } catch {
    return {};

}
